apiVersion: 1

deleteDatasources:
  - name: QuestDB
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: QuestDB
    type: postgres
    access: proxy
    url: questdb:8812
    user: kryor
    secureJsonData:
      password: kryor_dev
    jsonData:
      database: qdb
      sslmode: disable
      maxOpenConns: 5
      postgresVersion: 1200
    editable: true
